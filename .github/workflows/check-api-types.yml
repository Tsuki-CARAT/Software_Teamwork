name: Check API Types

on:
  pull_request:
    paths:
      - 'docs/services/gateway/api/openapi.yaml'
      - 'apps/web/src/api/generated/gateway.ts'
      - 'apps/web/package.json'
      - 'apps/web/bun.lock'

jobs:
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install dependencies
        working-directory: apps/web
        run: bun install --frozen-lockfile

      - name: Generate API types
        working-directory: apps/web
        run: bun run generate:api

      - name: Check for drift
        run: |
          if ! git diff --exit-code apps/web/src/api/generated/gateway.ts; then
            echo "::error::Generated types are out of sync. Run 'bun run --cwd apps/web generate:api' locally."
            exit 1
          fi
          echo "Types are in sync."
