name: Go Services

on:
  pull_request:
    branches: [develop]
    paths:
      - 'services/**'
      - '.github/workflows/go-services.yml'
  push:
    branches: [develop]
    paths:
      - 'services/**'
      - '.github/workflows/go-services.yml'

permissions:
  contents: read

jobs:
  service:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ai-gateway, auth, document, file, gateway, knowledge, qa]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Test
        run: go test ./...

      - name: Build server
        run: go build ./cmd/server

      - name: Build QA agent
        if: matrix.service == 'qa'
        run: go build ./cmd/agent

  knowledge-repository-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: services/knowledge
    env:
      KNOWLEDGE_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: services/knowledge/go.mod

      - name: Test repository lifecycle
        run: go test ./internal/repository -count=1
