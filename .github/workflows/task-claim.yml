name: Task Claim

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  repository-projects: write

jobs:
  claim:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Handle task comment
        uses: actions/github-script@v7
        env:
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        with:
          script: |
            const projectOwner = 'Sakayori-Iroha-168';
            const projectNumber = 1;
            const projectName = 'Software Teamwork';
            const projectGraphql = async (query, variables = {}) => {
              if (!process.env.PROJECTS_TOKEN) {
                return github.graphql(query, variables);
              }

              const response = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: {
                  authorization: `Bearer ${process.env.PROJECTS_TOKEN}`,
                  accept: 'application/vnd.github+json',
                  'content-type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              const payload = await response.json();
              if (!response.ok || payload.errors?.length) {
                const requestId = response.headers.get('x-github-request-id');
                const errors = payload.errors?.map((error) => error.message).join('; ') || `${response.status} ${response.statusText}`;
                throw new Error(`GitHub GraphQL request failed via PROJECTS_TOKEN: ${errors}${requestId ? ` (request id ${requestId})` : ''}`);
              }

              return payload.data;
            };
            const comment = context.payload.comment;
            const issue = context.payload.issue;
            const commentBody = (comment.body || '').trim();
            const claimMatch = commentBody.match(/^认领\s*[:：]\s*@?([A-Za-z0-9-]+)\s*$/u);
            const actualHoursMatch = commentBody.match(/^实际工时\s*[:：]\s*(.*?)\s*$/u);

            if (!claimMatch && !actualHoursMatch) {
              core.info('Comment is not a task claim or actual-hours update; skipping.');
              return;
            }

            const parseTaskCode = (title) => {
              const bracketedMatch = title.trim().match(/^\[([SABCFT]-(?:\d{8}-)?\d{2,3})\]\s+.+$/u);
              if (bracketedMatch) {
                return { taskCode: bracketedMatch[1], legacyTitle: false };
              }
              const bareMatch = title.trim().match(/^([SABCFT]-(?:\d{8}-)?\d{2,3})\s+.+$/u);
              return bareMatch
                ? { taskCode: bareMatch[1], legacyTitle: true }
                : { taskCode: '', legacyTitle: false };
            };

            const { taskCode, legacyTitle } = parseTaskCode(issue.title || '');
            if (!taskCode) {
              core.info('Issue title does not look like a managed task issue; skipping.');
              return;
            }
            if (legacyTitle) {
              core.warning(`Issue title uses legacy task format. Use '[${taskCode}] ...' for new task issues.`);
            }
            core.info(`Using ${process.env.PROJECTS_TOKEN ? 'PROJECTS_TOKEN' : 'GITHUB_TOKEN'} for Project GraphQL sync.`);

            const commenterLogin = comment.user.login;
            const prefix = taskCode[0];
            const defaultGroupByPrefix = {
              A: 'L1nggTeam',
              B: 'JerryTeam',
              C: 'PrimeTeam',
              F: 'Frontend',
              S: 'Special',
              T: 'Test',
            };
            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const cleanValue = (value) => value
              .trim()
              .replace(/^`|`$/g, '')
              .replace(/`/g, '')
              .trim();
            const readField = (label) => {
              const pattern = new RegExp(`^-\\s*${escapeRegExp(label)}\\s*[:：]\\s*(.+)$`, 'imu');
              const fieldMatch = (issue.body || '').match(pattern);
              return fieldMatch ? cleanValue(fieldMatch[1]) : '';
            };
            const readHourField = (baseLabel) => readField(`${baseLabel}（小时数）`) || readField(baseLabel);
            const parseHourNumber = (value, label) => {
              const normalized = cleanValue(value || '');
              if (!normalized || normalized === '待估' || normalized === '未填写') {
                return { number: 0, text: '0' };
              }
              if (!/^\d+(?:\.\d+)?$/u.test(normalized)) {
                throw new Error(`${label} must be a non-negative hour number without units, e.g. 0, 0.5, 1.25.`);
              }
              const number = Number(normalized);
              if (!Number.isFinite(number) || number < 0) {
                throw new Error(`${label} must be a finite non-negative hour number.`);
              }
              return { number, text: String(number) };
            };
            const formatFieldLine = (label, value) => `- ${label}：\`${value}\``;
            const replaceOrInsertField = (body, label, value, anchors = []) => {
              const nextLine = formatFieldLine(label, value);
              const pattern = new RegExp(`^-\\s*${escapeRegExp(label)}\\s*[:：].*$`, 'imu');
              if (pattern.test(body)) {
                return body.replace(pattern, () => nextLine);
              }

              for (const anchor of anchors) {
                const anchorPattern = new RegExp(`(^-\\s*${escapeRegExp(anchor)}\\s*[:：].*$)`, 'imu');
                if (anchorPattern.test(body)) {
                  return body.replace(anchorPattern, (line) => `${line}\n${nextLine}`);
                }
              }

              return `${body.trimEnd()}\n${nextLine}\n`;
            };
            const normalizeDependency = (value) => {
              const normalized = cleanValue(value || '');
              if (!normalized || normalized === '无') {
                return '无';
              }
              return normalized
                .split(/[，,、\s]+/u)
                .map((item) => cleanValue(item))
                .filter(Boolean)
                .join(', ') || '无';
            };

            const projectQuery = `
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    fields(first: 100) {
                      nodes {
                        ... on ProjectV2Field {
                          id
                          name
                          dataType
                        }
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const itemQuery = `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 50) {
                      nodes {
                        id
                        project {
                          id
                          title
                        }
                      }
                    }
                  }
                }
              }
            `;
            const addItemMutation = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item {
                    id
                  }
                }
              }
            `;
            const updateFieldMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: $value
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            const getProjectItemContext = async () => {
              const projectResult = await projectGraphql(projectQuery, {
                login: projectOwner,
                number: projectNumber,
              });
              const project = projectResult.user?.projectV2;
              if (!project) {
                throw new Error(`Project '${projectName}' was not found for ${projectOwner}.`);
              }

              const fieldByName = new Map();
              for (const field of project.fields.nodes.filter(Boolean)) {
                fieldByName.set(field.name, field);
              }

              const itemResult = await projectGraphql(itemQuery, { issueId: issue.node_id });
              let item = itemResult.node.projectItems.nodes.find((node) => node.project.id === project.id);

              if (!item) {
                const added = await projectGraphql(addItemMutation, {
                  projectId: project.id,
                  contentId: issue.node_id,
                });
                item = added.addProjectV2ItemById.item;
              }

              return { project, item, fieldByName };
            };

            const updateProjectFields = async (fieldUpdates) => {
              const { project, item, fieldByName } = await getProjectItemContext();

              for (const fieldUpdate of fieldUpdates) {
                const field = fieldByName.get(fieldUpdate.name);
                if (!field) {
                  throw new Error(`Project field '${fieldUpdate.name}' is unavailable.`);
                }

                let value;
                if (fieldUpdate.kind === 'single-select') {
                  const option = field.options?.find((candidate) => candidate.name === fieldUpdate.value);
                  if (!option) {
                    throw new Error(`Project field '${fieldUpdate.name}' option '${fieldUpdate.value}' is unavailable.`);
                  }
                  value = { singleSelectOptionId: option.id };
                } else if (fieldUpdate.kind === 'number') {
                  value = field.dataType === 'NUMBER'
                    ? { number: fieldUpdate.value.number }
                    : { text: fieldUpdate.value.text };
                  if (field.dataType && field.dataType !== 'NUMBER') {
                    core.warning(`Project field '${fieldUpdate.name}' is ${field.dataType}; writing text fallback. Convert it to a Number field for statistics.`);
                  }
                } else {
                  value = { text: fieldUpdate.value };
                }

                await projectGraphql(updateFieldMutation, {
                  projectId: project.id,
                  itemId: item.id,
                  fieldId: field.id,
                  value,
                });
              }
            };

            const group = defaultGroupByPrefix[prefix];
            const bodyGroup = readField('主责小组');
            if (bodyGroup && bodyGroup !== group) {
              core.warning(`Issue body group '${bodyGroup}' does not match task prefix '${prefix}'; using '${group}'.`);
            }
            const priority = readField('优先级') || 'P1';
            const batch = readField('批次') || 'Batch 4';
            const moduleName = readField('模块') || 'ci';
            const dependency = normalizeDependency(readField('依赖任务'));
            const taskStatus = readField('状态') || 'Draft';
            const expectedHoursRaw = readHourField('预期工时');
            const existingActualHoursRaw = readHourField('实际工时');

            const createComment = async (body) => {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
            };

            const updateIssueBody = async (nextBody) => {
              if (nextBody === (issue.body || '')) {
                return;
              }

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: nextBody,
              });
            };

            if (actualHoursMatch) {
              const requestedActualHours = cleanValue(actualHoursMatch[1]);
              if (!requestedActualHours) {
                await createComment('实际工时更新失败：请使用 `实际工时：2` 或 `实际工时：0.5` 这类小时数字格式。');
                core.info('Actual-hours update rejected because value is empty.');
                return;
              }
              let requestedActualHoursValue;
              try {
                requestedActualHoursValue = parseHourNumber(requestedActualHours, '实际工时（小时数）');
              } catch (error) {
                await createComment('实际工时更新失败：请填写非负小时数，不要带单位；例如 `实际工时：2` 或 `实际工时：0.5`。');
                core.info(`Actual-hours update rejected because value is invalid: ${error.message}`);
                return;
              }

              const trustedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
              const isTrustedCommenter = trustedAssociations.has(comment.author_association);
              const isAssignee = (issue.assignees || []).some((assignee) => assignee.login.toLowerCase() === commenterLogin.toLowerCase());
              if (!isTrustedCommenter && !isAssignee) {
                await createComment('实际工时更新失败：只有仓库维护者、协作者或当前 Assignee 可以设置实际工时。');
                core.info('Actual-hours update rejected because commenter is not trusted or assigned.');
                return;
              }

              let syncState = 'pending';
              let syncErrorMessage = '';
              try {
                await updateProjectFields([
                  { kind: 'number', name: 'ExpectedHours', value: parseHourNumber(expectedHoursRaw, '预期工时（小时数）') },
                  { kind: 'number', name: 'ActualHours', value: requestedActualHoursValue },
                  { kind: 'text', name: 'OwnerNote', value: `@${commenterLogin} 通过 issue 评论更新实际工时；任务编号 ${taskCode}；由 Task Claim 更新。` },
                ]);
                syncState = 'synced';
              } catch (error) {
                syncState = 'blocked';
                syncErrorMessage = error.message;
                core.warning(
                  `Project actual-hours sync failed. Configure PROJECTS_TOKEN as a token owned by or granted access to the user-level Project '${projectName}', with Project read/write access. ${error.message}`
                );
              }

              const body = issue.body || '';
              let nextBody = replaceOrInsertField(body, '实际工时（小时数）', requestedActualHoursValue.text, ['预期工时（小时数）', '预期工时', '模块']);
              nextBody = replaceOrInsertField(nextBody, 'Project sync', syncState, ['GitHub Project']);
              await updateIssueBody(nextBody);

              if (syncState === 'blocked') {
                core.setFailed(`Updated actual hours on issue #${issue.number}, but Project sync is blocked. ${syncErrorMessage}`);
              } else {
                await createComment(`实际工时已更新为 \`${requestedActualHoursValue.text}\` 小时。`);
                core.info(`Updated actual hours on issue #${issue.number} to ${requestedActualHoursValue.text} hours.`);
              }
              return;
            }

            const requestedLogin = claimMatch[1];
            if (['Blocked', 'Review', 'Done'].includes(taskStatus)) {
              await createComment(`认领失败：当前任务状态为 \`${taskStatus}\`，请先由协调人改为 \`Draft\` 或 \`Ready\` 后再认领。`);
              core.info(`Claim rejected because issue status is ${taskStatus}.`);
              return;
            }

            if (requestedLogin.toLowerCase() !== commenterLogin.toLowerCase()) {
              await createComment(`认领失败：请使用自己的 GitHub 用户名认领，例如 \`认领：@${commenterLogin}\`。`);
              core.info('Claim rejected because mentioned login differs from commenter.');
              return;
            }

            const assignees = issue.assignees || [];
            const existingAssignee = assignees.find((assignee) => assignee.login.toLowerCase() !== commenterLogin.toLowerCase());
            if (existingAssignee) {
              await createComment(`认领失败：本任务已有主责人 @${existingAssignee.login}。如需转让，请先在 issue 评论中完成交接。`);
              core.info('Claim rejected because issue already has another assignee.');
              return;
            }

            const alreadyAssigned = assignees.some((assignee) => assignee.login.toLowerCase() === commenterLogin.toLowerCase());
            if (!alreadyAssigned) {
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: [commenterLogin],
                });
              } catch (error) {
                await createComment(`认领失败：无法将 @${commenterLogin} 设为 Assignee。请确认该账号有仓库协作权限。`);
                throw error;
              }
            }

            let syncState = 'pending';
            let syncErrorMessage = '';

            try {
              await updateProjectFields([
                { kind: 'single-select', name: 'Status', value: 'In Progress' },
                { kind: 'single-select', name: 'Group', value: group },
                { kind: 'single-select', name: 'Priority', value: priority },
                { kind: 'single-select', name: 'Batch', value: batch },
                { kind: 'single-select', name: 'Module', value: moduleName },
                { kind: 'single-select', name: 'Risk', value: 'Normal' },
                { kind: 'text', name: 'Dependency', value: dependency },
                { kind: 'number', name: 'ExpectedHours', value: parseHourNumber(expectedHoursRaw, '预期工时（小时数）') },
                { kind: 'number', name: 'ActualHours', value: parseHourNumber(existingActualHoursRaw, '实际工时（小时数）') },
                { kind: 'text', name: 'OwnerNote', value: `@${commenterLogin} 通过 issue 评论认领；任务编号 ${taskCode}；由 Task Claim 更新。` },
              ]);
              syncState = 'synced';
            } catch (error) {
              syncState = 'blocked';
              syncErrorMessage = error.message;
              core.warning(
                `Project status sync failed. Configure PROJECTS_TOKEN as a token owned by or granted access to the user-level Project '${projectName}', with Project read/write access. ${error.message}`
              );
            }

            const body = issue.body || '';
            let nextBody = replaceOrInsertField(body, '状态', 'In Progress', ['编号']);
            nextBody = replaceOrInsertField(nextBody, 'Risk', 'Normal', ['模块']);
            nextBody = replaceOrInsertField(nextBody, 'Project sync', syncState, ['GitHub Project']);
            await updateIssueBody(nextBody);

            if (syncState === 'blocked') {
              core.setFailed(`Assigned issue #${issue.number} to @${commenterLogin}, but Project sync is blocked. ${syncErrorMessage}`);
            } else {
              core.info(`Assigned issue #${issue.number} to @${commenterLogin}.`);
            }
