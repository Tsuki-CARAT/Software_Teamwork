services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: document_system
      POSTGRES_USER: document_app
      POSTGRES_PASSWORD: document_app_dev
      TZ: Asia/Shanghai
    ports:
      - "${DOCUMENT_POSTGRES_PORT:-5435}:5432"
    volumes:
      - document_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U document_app -d document_system"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  document_pg_data:
