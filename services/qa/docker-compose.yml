services:
  auth-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_system
      POSTGRES_USER: auth_app
      POSTGRES_PASSWORD: auth_app_dev
      TZ: Asia/Shanghai
    ports:
      - "${AUTH_POSTGRES_PORT:-5434}:5432"
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
      - ../auth/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_app -d auth_system"]
      interval: 3s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qa_system
      POSTGRES_USER: qa_app
      POSTGRES_PASSWORD: qa_app_dev
      TZ: Asia/Shanghai
    ports:
      - "${QA_POSTGRES_PORT:-5433}:5432"
    volumes:
      - qa_pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_app -d qa_system"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "${GATEWAY_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  auth:
    build:
      context: ../auth
      dockerfile: ${AUTH_DOCKERFILE:-Dockerfile}
    environment:
      AUTH_HTTP_ADDR: :8081
      AUTH_DATABASE_URL: postgres://auth_app:auth_app_dev@auth-postgres:5432/auth_system?sslmode=disable
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-24h}
      AUTH_BOOTSTRAP_ADMIN_USERNAME: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      AUTH_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${AUTH_BOOTSTRAP_ADMIN_DISPLAY_NAME:-系统管理员}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-admin123456}
    ports:
      - "${AUTH_HTTP_PORT:-8081}:8081"
    depends_on:
      auth-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

  qa:
    build:
      context: .
      dockerfile: ${QA_DOCKERFILE:-Dockerfile}
    environment:
      QA_HTTP_ADDR: :8084
      QA_DATABASE_URL: postgres://qa_app:qa_app_dev@postgres:5432/qa_system?sslmode=disable
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY must be set}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      MODEL_ID: ${MODEL_ID:-deepseek-chat}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-disabled}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      QA_CONFIG_ENCRYPTION_KEY: ${QA_CONFIG_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
      AGENT_WORKDIR: /workspace
      AGENT_ENABLE_COMMAND_TOOL: ${AGENT_ENABLE_COMMAND_TOOL:-false}
    ports:
      - "${QA_HTTP_PORT:-8084}:8084"
    volumes:
      - qa_agent_workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8084/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: ../gateway
      dockerfile: ${GATEWAY_DOCKERFILE:-Dockerfile}
    environment:
      GATEWAY_HTTP_ADDR: :8080
      AUTH_SERVICE_URL: http://auth:8081
      QA_SERVICE_URL: http://qa:8084
      GATEWAY_REDIS_ADDR: redis:6379
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
    depends_on:
      auth:
        condition: service_healthy
      qa:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  auth_pg_data:
  qa_pg_data:
  qa_agent_workspace:
